  const state = {

  function formatAmount(n){
    if (n === null || n === undefined || n === '' || Number.isNaN(n)) return '0';
    if (typeof n === 'string') n = Number(n.replace(/[，,\s]/g,''));
    if (!Number.isFinite(n)) return '0';
    n = Number(n.toFixed(10));
    let s = String(n);
    if (/[eE]/.test(s)) s = n.toFixed(10);
    s = s.replace(/\.?0+$/,'');
    return s === '-0' ? '0' : s;
  }

  function amountKey(n){
    const v = Number(n);
    if (!Number.isFinite(v)) return '0.00';
    return (Math.round(v * 100) / 100).toFixed(2);
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  function parseAmount(str){
    if (!str || !String(str).trim()) return NaN;
    return Number(String(str).replace(/[，,\s]/g,''));
  }

  function makeOrderLabel(order, index){
    const a = order.paidan || '未知派单';
    const b = order.boss || '未知老板';
    const c = order.type || '未填类型';
    const d = order.time || '';
    return `${index + 1}. ${a} / ${b} / ${c}${d ? ' / ' + d : ''}`;
  }

  function parseOrders(text){
    if (!text || !text.trim()) return [];
    return text
      .split(/\n\s*\n/)
      .map(block => block.trim())
      .filter(Boolean)
      .map((block, index) => {
        const order = {
          index,
          paidan: '',
          peipei: [],
          boss: '',
          type: '',
          time: '',
          remark: '',
          totalPrice: NaN,
          tuanchou: NaN,
          paichou: NaN,
          daoshou: NaN
        };
        block.split('\n').map(s => s.trim()).filter(Boolean).forEach(line => {
          const m = line.match(/^(.+?)[：:]\s*(.*)$/);
          if (!m) return;
          const field = m[1].trim();
          const val = m[2].trim();
          if (field === '派单') order.paidan = val;
          else if (field === '陪陪') order.peipei = val ? val.split(/\s+/).filter(Boolean) : [];
          else if (field === '老板') order.boss = val;
          else if (field === '类型') order.type = val;
          else if (field === '时长') order.time = val;
          else if (field === '备注') order.remark = val;
          else if (Object.prototype.hasOwnProperty.call(amountFields, field)) order[amountFields[field]] = parseAmount(val);
        });
        return order;
      })
      .filter(o => o.peipei.length > 0 && Number.isFinite(o.daoshou));
  }

  function aggregatePeople(orders){
    const map = new Map();
    orders.forEach((order, oi) => {
      const amount = Number(order.daoshou);
      const label = makeOrderLabel(order, oi);
      order.peipei.forEach(name => {
        if (!map.has(name)){
          map.set(name, { name, total: 0, items: [] });
        }
        const p = map.get(name);
        p.total = Number((p.total + amount).toFixed(10));
        p.items.push({
          label,
          amount,
          orderIndex: oi,
          orderType: order.type,
          boss: order.boss,
          paidan: order.paidan
        });
      });
    });
    return [...map.values()].sort((a,b) => b.total - a.total || a.name.localeCompare(b.name,'zh-Hans-CN'));
  }

  function buildProjectGroups(orders){
    return orders.map((order, oi) => {
      const amount = Number(order.daoshou);
      const participants = [...order.peipei];
      const totalForOrder = Number((participants.length * amount).toFixed(10));
      return {
        key: oi,
        order,
        label: makeOrderLabel(order, oi),
        participants,
        amount,
        totalForOrder
      };

  // 智能结账 2.2：以劳动力为目标的跨群组合优化
  // 成本模型：建一个群聊 = 3；一次单独转账 = 1。
  // 同一陪玩可加入多个群聊；群内成员领取相同金额；不足部分最多保留一次单独转账。
  function buildSmartGroups(orders, people){
    const GROUP_COST = 3;
    const MIN_GROUP_SIZE = 3;
    const cents = n => Math.round(Number(n || 0) * 100);
    const totals = people.map(p => ({...p, cents: cents(p.total)}));
    if (!totals.length) return { groupUnits: [], soloUnits: [], labor: 0, baseline: 0, exact: true };

    // 原订单中“相同人员集合+相同单价”的项目先叠加，作为高价值候选金额。
    const merged = new Map();
    orders.forEach(o => {
      if (o.peipei.length < MIN_GROUP_SIZE) return;
      const names=[...new Set(o.peipei)].sort();
      const key = names.join('|') + '::' + cents(o.daoshou);
      if(!merged.has(key)) merged.set(key,{amount:0,people:names});
      merged.get(key).amount += cents(o.daoshou);
    });
    const sourceCandidates = [...new Set([...merged.values()].map(v=>v.amount))].filter(v => v > 0);
    const sourceMembers = new Map();
    [...merged.values()].forEach(v=>{
      if(!sourceMembers.has(v.amount)) sourceMembers.set(v.amount,new Set());
      v.people.forEach(n=>sourceMembers.get(v.amount).add(n));
    });

    // 候选金额来自原项目、个人总额及个人总额之间的差值。
    const uniqueTotals = [...new Set(totals.map(p => p.cents))].sort((a,b)=>a-b);
    const candidateSet = new Set(sourceCandidates);
    uniqueTotals.forEach(v => candidateSet.add(v));
    for (let i=0;i<uniqueTotals.length;i++){
      for (let j=0;j<i;j++) candidateSet.add(uniqueTotals[i]-uniqueTotals[j]);
    }

    const scoreCandidate = amount => {
      let support = 0;
      totals.forEach(p => {
        if (p.cents >= amount) support++;
        if (p.cents === amount) support += 3;
      });
      if (sourceCandidates.includes(amount)) support += 12;
      return support;
    };
    let candidates = [...candidateSet]
      .filter(v => v > 0 && totals.filter(p => p.cents >= v).length >= MIN_GROUP_SIZE)
      .sort((a,b) => scoreCandidate(b)-scoreCandidate(a) || a-b);
    const mustKeep = sourceCandidates.filter(v => candidates.includes(v));
    candidates = [...new Set([...mustKeep, ...candidates.slice(0, 20)])].sort((a,b)=>a-b);

    function evaluate(amounts){
      const k = amounts.length;
      const sums = new Array(1<<k).fill(0);
      for (let mask=1; mask<(1<<k); mask++){
        const bit = mask & -mask;
        const idx = Math.log2(bit)|0;
        sums[mask] = sums[mask ^ bit] + amounts[idx];
      }
      const usage=new Array(k).fill(0);
      const picked=[];
      let solos=0;
      totals.forEach(p => {
        const options=[];
        for(let mask=0; mask<(1<<k); mask++){
          if(sums[mask] <= p.cents){
            const residual=p.cents-sums[mask];
            const bits=mask.toString(2).replace(/0/g,'').length;
            let affinity=0;
            for(let j=0;j<k;j++) if(mask&(1<<j)){
              const members=sourceMembers.get(amounts[j]);
              if(members && members.has(p.name)) affinity++;
            }
            // 先消除单独转账；同等劳动力下优先复用原群成员，再减少跨群复杂度。
            options.push({mask,residual,exact:residual===0,bits,affinity});
          }
        }
        options.sort((a,b)=>Number(b.exact)-Number(a.exact) || b.affinity-a.affinity || b.bits-a.bits || b.residual-a.residual);
        const chosen=options[0];
        picked.push(chosen);
        if(chosen.residual>0) solos++;
        for(let j=0;j<k;j++) if(chosen.mask&(1<<j)) usage[j]++;
      });
      if(usage.some(v=>v<MIN_GROUP_SIZE)) return null;
      return {amounts, picked, usage, solos, memberTouches:usage.reduce((a,b)=>a+b,0), labor:k*GROUP_COST+solos};
    }

    let best={amounts:[], picked:totals.map(p=>({mask:0,residual:p.cents})), usage:[], solos:totals.length, labor:totals.length, memberTouches:0};
    const maxGroups=Math.min(4, Math.floor((totals.length-1)/GROUP_COST), candidates.length);
    function consider(combo){
      const result=evaluate(combo);
      if(!result) return;
      if(result.labor < best.labor ||
         (result.labor===best.labor && result.solos<best.solos) ||
         (result.labor===best.labor && result.solos===best.solos && result.amounts.length<best.amounts.length) ||
         (result.labor===best.labor && result.solos===best.solos && result.amounts.length===best.amounts.length && result.memberTouches>best.memberTouches)) best=result;
    }
    function combine(start, need, combo){
      if(need===0){ consider([...combo]); return; }
      for(let i=start;i<=candidates.length-need;i++){
        combo.push(candidates[i]); combine(i+1,need-1,combo); combo.pop();
      }
    }
    for(let k=1;k<=maxGroups;k++) combine(0,k,[]);

    const groupUnits=best.amounts.map((amount, gi) => ({
      type:'group',
      amount:amount/100,
      people:totals.filter((p,pi)=>best.picked[pi].mask&(1<<gi)).map(p=>p.name),
      memberCount:best.usage[gi],
      cost:GROUP_COST
    })).sort((a,b)=>b.amount-a.amount);

    const soloUnits=[];
    totals.forEach((p,pi)=>{
      const residual=best.picked[pi].residual;
      if(residual>0){
        const joined=[];
        best.amounts.forEach((a,gi)=>{ if(best.picked[pi].mask&(1<<gi)) joined.push(a/100); });
        soloUnits.push({name:p.name,total:residual/100,originalTotal:p.total,joinedGroups:joined,items:p.items});
      }
    });
    soloUnits.sort((a,b)=>b.total-a.total || a.name.localeCompare(b.name,'zh-Hans-CN'));
    return {groupUnits, soloUnits, labor:best.labor, baseline:totals.length, groupCost:GROUP_COST, minGroupSize:MIN_GROUP_SIZE, exact:true};
  }

  function cardAccent(idx){
    const palette = [
      'linear-gradient(90deg,#3e5f9b,#6d8fd1)',
      'linear-gradient(90deg,#2f8f6b,#66b994)',
      'linear-gradient(90deg,#b37b00,#e0b65a)',
      'linear-gradient(90deg,#8a5bd1,#b58cf0)',
      'linear-gradient(90deg,#d04f78,#ef86a5)'
    ];
    return palette[idx % palette.length];
  }

  function personCalcLine(person){
    const sorted = [...person.items].sort((a,b) => a.orderIndex - b.orderIndex);
    const expr = sorted.map(i => formatAmount(i.amount)).join(' + ');
    const amount = formatAmount(person.total);
    const labels = sorted.map(i => `${i.orderType || i.paidan || '订单'} ${formatAmount(i.amount)}`);
    return {
      expr,
      amount,
      labels
    };
  }

  function renderCommon(){
    if (!state.people.length){
      el.commonList.innerHTML = '<div class="empty">暂无数据。请先粘贴订单并解析。</div>';
      return;
    }
    el.commonList.innerHTML = state.people.map((p, idx) => {
      const calc = personCalcLine(p);
      const accent = cardAccent(idx);
      const lines = p.items.map((item, i) => `<span class="mini">${escapeHtml(item.orderType || item.paidan || ('订单' + (i+1)))} ${escapeHtml(formatAmount(item.amount))}</span>`).join('');
      return `
        <div class="group-card">
          <div class="group-accent" style="background:${accent}"></div>
          <div class="body">
            <div class="group-head">
              <div>
                <div class="group-title">${escapeHtml(p.name)} <span class="chip ok">${escapeHtml(formatAmount(p.total))} 元</span></div>
                <div class="card-desc">累计参与 ${p.items.length} 单，按每单到手金额累加后的个人总收入。</div>
              </div>
              <div class="group-meta">
                <span class="chip">常规结账</span>
                <span class="chip">单人独立</span>
              </div>
            </div>
            <div class="formula">${escapeHtml(calc.expr)} = <strong>${escapeHtml(calc.amount)}</strong></div>
            <div class="calc-chip-list">${lines}</div>
          </div>
        </div>`;
    }).join('');
  }

  function renderProject(){
    if (!state.projectGroups.length){
      el.projectList.innerHTML = '<div class="empty">暂无数据。请先粘贴订单并解析。</div>';
      return;
    }
    el.projectList.innerHTML = state.projectGroups.map((g, idx) => {
      const order = g.order;
      const accent = cardAccent(idx);
      const participants = g.participants.map(n => `<span class="name-tag">${escapeHtml(n)}</span>`).join('');
      const metaParts = [
        order.paidan ? `派单：${order.paidan}` : '',
        order.boss ? `老板：${order.boss}` : '',
        order.type ? `类型：${order.type}` : '',
        order.time ? `时长：${order.time}` : '',
        order.remark ? `备注：${order.remark}` : ''
      ].filter(Boolean).join(' ｜ ');
      const totalOrder = formatAmount(g.totalForOrder);
      const single = formatAmount(g.amount);
      return `
        <div class="group-card">
          <div class="group-accent" style="background:${accent}"></div>
          <div class="body">
            <div class="group-head">
              <div>
                <div class="group-title">${escapeHtml(g.label)}</div>
                <div class="card-desc">${escapeHtml(metaParts || '该单未提供额外信息')}</div>
              </div>
              <div class="group-meta">
                <span class="chip primary">同项目结账</span>
                <span class="chip">${g.participants.length} 人</span>
                <span class="chip ok">单人 ${single} 元</span>
              </div>
            </div>
            <div class="formula">${escapeHtml(g.participants.length)} 人 × <strong>${escapeHtml(single)}</strong> 元 = <strong>${escapeHtml(totalOrder)}</strong> 元</div>
            <div class="names">${participants}</div>
          </div>
        </div>`;
    }).join('');
  }

  function renderTuanchou(){
    const amounts = state.orders.map(o => Number(o.tuanchou)).filter(v => Number.isFinite(v));
    if (!amounts.length){
      $('tuanchouContent').innerHTML = '团抽总和 = 暂无数据';
      return;
    }
    const total = amounts.reduce((acc, val) => Number((acc + val).toFixed(10)), 0);
    const expr = amounts.map(formatAmount).join(' + ');
    $('tuanchouContent').innerHTML = `团抽总和 = ${escapeHtml(expr)} = <strong>${escapeHtml(formatAmount(total))}</strong>`;
  }

  function renderSmart(){
    const { groupUnits, soloUnits, labor, baseline } = state.smartGroups;
    const saved = Math.max(0, baseline - labor);
    const ok = labor < baseline;
    el.metricSmart.textContent = state.people.length ? `${labor} 劳动力` : '-';
    el.metricSmart.style.color = ok ? 'var(--success)' : 'var(--warn)';
    if (!state.people.length){
      el.smartList.innerHTML = '<div class="empty">暂无数据。请先粘贴订单并解析。</div>';
      return;
    }
    let html = `<div class="formula" style="margin-bottom:12px">优化目标：<strong>群聊数 × 3 + 单独转账数</strong> 最小。同一陪玩可以出现在多个群聊；群聊至少 3 人。</div>`;
    if(groupUnits.length){
      html += `<div class="card-title" style="margin-bottom:8px;font-size:.9rem;color:var(--muted)">💬 最优群聊（${groupUnits.length} 个）</div>`;
      html += groupUnits.map((g,idx)=>`
        <div class="group-card">
          <div class="group-accent" style="background:${cardAccent(idx)}"></div>
          <div class="body">
            <div class="group-head">
              <div class="group-title">群聊 ${String.fromCharCode(65+idx)} · 每人 ${escapeHtml(formatAmount(g.amount))} 元</div>
              <div class="group-meta"><span class="chip ok">${g.people.length} 人</span><span class="chip warn">3 劳动力</span></div>
            </div>
            <div class="names">${g.people.map(n=>`<span class="name-tag">${escapeHtml(n)}</span>`).join('')}</div>
          </div>
        </div>`).join('');
    }
    if(soloUnits.length){
      html += `<div class="card-title" style="margin:16px 0 8px;font-size:.9rem;color:var(--muted)">💸 剩余单独转账（${soloUnits.length} 人）</div>`;
      html += soloUnits.map((s,idx)=>`
        <div class="group-card">
          <div class="group-accent" style="background:${cardAccent(groupUnits.length+idx)}"></div>
          <div class="body">
            <div class="group-head">
              <div><div class="group-title">${escapeHtml(s.name)} <span class="chip warn">${escapeHtml(formatAmount(s.total))} 元</span></div>
              <div class="card-desc">个人总应收 ${escapeHtml(formatAmount(s.originalTotal))} 元${s.joinedGroups.length ? `，已通过群聊领取 ${s.joinedGroups.map(formatAmount).join(' + ')} 元` : ''}</div></div>
              <div class="group-meta"><span class="chip">单独转账</span><span class="chip warn">1 劳动力</span></div>
            </div>
          </div>
        </div>`).join('');
    }else{
      html += `<div class="chip ok" style="margin-top:12px">全部金额已由群聊完整覆盖，无需单独转账</div>`;
    }
    html += `<div class="formula" style="margin-top:12px">全员单独需要 ${baseline} 劳动力；当前方案需要 <strong>${labor}</strong>，共节省 <strong>${saved}</strong>。</div>`;
    el.smartList.innerHTML=html;
  }

  function renderAll(){
    state.people = aggregatePeople(state.orders);
    state.projectGroups = buildProjectGroups(state.orders);
    state.smartGroups = buildSmartGroups(state.orders, state.people);

    el.metricOrders.textContent = String(state.orders.length);
    el.metricPeople.textContent = String(state.people.length);

    const { groupUnits, soloUnits } = state.smartGroups;
    const smartCount = groupUnits.length + soloUnits.length;
    const groupCount = state.mode === 'common' ? state.people.length : state.mode === 'project' ? state.projectGroups.length : smartCount;
    el.metricGroups.textContent = String(groupCount);

    if (state.mode === 'smart'){
      const labor = state.smartGroups.labor || 0;
      el.metricSmart.textContent = state.people.length ? `${labor} 劳动力` : '-';
      el.metricSmart.style.color = labor < state.people.length ? 'var(--success)' : 'var(--warn)';
    } else {
      el.metricSmart.textContent = state.people.length ? String(state.smartGroups.labor) : '-';
      el.metricSmart.style.color = 'var(--text)';
    }

    renderCommon();
    renderProject();
    renderSmart();
    renderTuanchou();

  }

  function buildSummaryText(){
    if (!state.orders.length) return '暂无数据';
    const modeName = state.mode === 'common' ? '常规结账' : state.mode === 'project' ? '同项目结账' : '智能结账';
    const lines = [];
    lines.push(`模式：${modeName}`);
    lines.push(`订单数：${state.orders.length}`);
    lines.push(`陪玩人数：${state.people.length}`);
    if (state.mode === 'smart'){
      const { groupUnits, soloUnits, labor } = state.smartGroups;
      lines.push(`智能结账：${labor} 劳动力（${groupUnits.length} 群聊×3 + ${soloUnits.length} 单独转账）`);
      groupUnits.forEach((g,i) => lines.push(`群聊${String.fromCharCode(65+i)} 每人${formatAmount(g.amount)}元：${g.people.join('、')}`));
      soloUnits.forEach(s => lines.push(`单独：${s.name} ${formatAmount(s.total)}元`));
    }
    if (state.mode === 'common'){
      state.people.slice(0, 6).forEach(p => {
        lines.push(`${p.name}：${formatAmount(p.total)}`);
      });
    } else if (state.mode === 'project'){
      state.projectGroups.slice(0, 6).forEach(g => {
        lines.push(`${g.label}：${g.participants.length} 人 × ${formatAmount(g.amount)} = ${formatAmount(g.totalForOrder)}`);
      });
    }
    return lines.join('\n');
  }

  function setMode(mode){
    state.mode = mode;
    el.modeSwitch.querySelectorAll('.seg-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.mode === mode);
    });
    document.getElementById('view-common').classList.toggle('active', mode === 'common');
    document.getElementById('view-project').classList.toggle('active', mode === 'project');
    document.getElementById('view-smart').classList.toggle('active', mode === 'smart');
    renderAll();
  }

  function parseAndRender(){
    const text = el.orderInput.value.trim();
    if (!text){
      toast('请先输入订单数据');
      return;
    }
    const orders = parseOrders(text);
    if (!orders.length){
      toast('未能解析到有效订单');
      return;
    }
    state.orders = orders;
    renderAll();
    toast(`成功解析 ${orders.length} 条订单`);
  }

  function exportCSV(filename, headers, rows){
    const csv = '\uFEFF' + [headers.join(',')].concat(rows.map(row =>
      row.map(v => {
        const s = String(v ?? '');
        return /[,"\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
      }).join(',')
    )).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8;'}));
    a.download = filename;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
  }

  function exportCurrent(){
    if (!state.orders.length){
      toast('暂无数据');
      return;
    }
    const mode = state.mode;
    if (mode === 'common'){
      exportCSV('常规结账导出.csv', ['陪玩名字', '个人总收入', '计算过程'], state.people.map(p => {
        const calc = personCalcLine(p);
        return [p.name, formatAmount(p.total), `${calc.expr} = ${calc.amount}`];
      }));
      toast('已导出常规结账');
    } else if (mode === 'project'){
      exportCSV('同项目结账导出.csv', ['项目', '陪玩名单', '单人到手', '人数', '项目总额'], state.projectGroups.map(g => [
        g.label,
        g.participants.join(' / '),
        formatAmount(g.amount),
        g.participants.length,
        formatAmount(g.totalForOrder)
      ]));
      toast('已导出同项目结账');
    } else {
      const { groupUnits, soloUnits } = state.smartGroups;
      const rows = [
        ...groupUnits.map((g,i) => ['群聊'+String.fromCharCode(65+i), formatAmount(g.amount), g.people.length, g.people.join(' / '), '允许跨群，成本3']),
        ...soloUnits.map(s => ['单独转账', formatAmount(s.total), 1, s.name, `总应收${formatAmount(s.originalTotal)}；群聊已付${s.joinedGroups.map(formatAmount).join('+') || '0'}`])
      ];
      exportCSV('智能结账导出.csv', ['类型', '金额', '人数', '名单', '来源'], rows);
      toast('已导出智能结账');
    }
  }

  function copyText(text, successMessage){
    const fallback = () => {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
      toast(successMessage);
    };
    if (navigator.clipboard?.writeText) navigator.clipboard.writeText(text).then(() => toast(successMessage)).catch(fallback);
    else fallback();
  }

  function copyTuanchou(){
    const hasOrders = state.orders.length > 0;
    if (!hasOrders){
      toast('暂无团抽数据');
      return;
    }
    const parts = state.orders
      .map(o => Number(o.tuanchou))
      .filter(v => Number.isFinite(v));
    if (!parts.length){
      toast('暂无团抽数据');
      return;
    }
    const total = parts.reduce((a,b)=> Number((a + b).toFixed(10)), 0);
    const expr = parts.map(formatAmount).join(' + ');
    const text = `团抽总和 = ${expr} = ${formatAmount(total)}`;
    copyText(text, '已复制团抽');
  }

  function copySummary(){
    const text = buildSummaryText();
    if (!text || text === '暂无数据'){
      toast('暂无可复制内容');
      return;
    }
    copyText(text, '已复制汇总文案');
  }

  async function pasteAdd(){
    try{
      if (!navigator.clipboard?.readText){
        toast('当前环境不支持剪贴板，请手动粘贴');
        return;
      }
      const text = await navigator.clipboard.readText();
      if (!text || !text.trim()){
        toast('剪贴板为空');
        return;
      }
      const current = el.orderInput.value.trim();
      el.orderInput.value = current ? `${current}\n\n${text.trim()}` : text.trim();
      toast('已追加粘贴');
    }catch(e){
      toast('读取剪贴板失败');
    }
  }

  el.modeSwitch.addEventListener('click', (e) => {
    const btn = e.target.closest('.seg-btn');
    if (!btn) return;
    setMode(btn.dataset.mode);
  });

  el.btnParse.addEventListener('click', parseAndRender);
  el.btnLoadSample.addEventListener('click', () => { el.orderInput.value = SAMPLE_DATA; parseAndRender(); });
  el.btnClearInput.addEventListener('click', () => { el.orderInput.value = ''; state.orders = []; state.people = []; state.projectGroups = []; state.smartGroups = { groupUnits: [], soloUnits: [], labor: 0, baseline: 0, groupCost: 3 }; renderAll(); toast('已清空'); });
  el.btnPasteAdd.addEventListener('click', pasteAdd);
  el.btnExport.addEventListener('click', exportCurrent);
  el.btnCopySummary.addEventListener('click', copySummary);
  $('btnCopyTuanchou').addEventListener('click', copyTuanchou);

  el.orderInput.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter'){
      e.preventDefault();
      parseAndRender();
    }
  });

  // 初始状态
  renderAll();
  setMode('smart');
})();
</script>
</body>
</html>
